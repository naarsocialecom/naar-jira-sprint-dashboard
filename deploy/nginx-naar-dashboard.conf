##
## /etc/nginx/sites-available/naar-dashboard
## Symlink: ln -s /etc/nginx/sites-available/naar-dashboard /etc/nginx/sites-enabled/
##

server {
    listen 80;
    server_name your-domain.com;          # <── change to your domain or IP

    # Redirect HTTP → HTTPS (remove this block if you're not using HTTPS yet)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name your-domain.com;          # <── change to your domain or IP

    # ── SSL certs (replace with your certbot/letsencrypt paths) ──
    ssl_certificate     /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # ── Logging ──
    access_log /var/log/nginx/naar-dashboard.access.log;
    error_log  /var/log/nginx/naar-dashboard.error.log;

    # ── Static files served directly by Nginx (faster than Flask) ──
    location /static/ {
        alias /opt/naar-live/frontend/static/;
        expires 7d;
        add_header Cache-Control "public, immutable";
        gzip_static on;
    }

    # ── All other requests go to Gunicorn ──
    location / {
        proxy_pass         http://127.0.0.1:5005;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }
}
